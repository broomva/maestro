name: CI

# Strong PR gate (BRO-1793): lint + format, typecheck, tests, secret scan, and a
# single-binary compile. Made required via branch protection; automerge lands a
# PR only when every job here is green. Never merge red (bstack P4 · Pipeline).
#
# Jobs are independent (no `needs:`) so each reports its own status and none is
# skipped-by-dependency — a skipped required check has ambiguous merge semantics,
# so we avoid it. The path-filtered L3 stability gate (l3-stability.yml) stays
# advisory and is NOT a required check (it would deadlock PRs that don't touch
# governance paths).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Lint + format (biome ci)
        run: bunx @biomejs/biome ci .
      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck
      - name: Test
        # --pass-with-no-tests keeps the gate dormant until tests land, then it
        # bites automatically. P2 hook point (D8 layer 1): the mock-model loop
        # tests join this step when BRO-1795/harness lands.
        run: bun test --pass-with-no-tests

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks (secret scan)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Resolve the latest gitleaks release so the download always hits a real
          # asset (the `dir` subcommand requires >= 8.19.0). github.token avoids API limits.
          TAG=$(curl -sSL -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest | \
            python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
          VERSION="${TAG#v}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${TAG}/gitleaks_${VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          # .gitleaks.toml (repo root) allowlists vendored paths; --exit-code 1 fails on any finding.
          ./gitleaks dir . --config .gitleaks.toml --redact --no-banner --exit-code 1

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Compile runtime single-binary
        run: |
          mkdir -p dist
          bun build --compile apps/runtime/src/index.ts --outfile dist/maestro
      - name: Build app (Vite SPA + tokens)
        # BRO-1782: the M0 client must build in CI. This regenerates the token
        # dist (gitignored) then runs `vite build`. Playwright's browser smoke
        # stays a local P11 gate (no browser install in CI).
        run: bun run --filter @maestro/app build
      - name: Upload runtime binary (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: maestro-runtime
          path: dist/maestro
          if-no-files-found: error
          retention-days: 7

  governance:
    name: governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch bstack (portable harness metalayer — resolved, not vendored)
        # bstack is NOT committed to this repo (BRO-1842). Clone it and expose it
        # via BSTACK_HOME so bin/bstack resolves the CLI. Mirrors l3-stability.yml.
        run: git clone --depth 1 https://github.com/broomva/bstack.git /tmp/bstack
      - name: bstack doctor (metalayer compliance)
        # Non-strict (BRO-1793): exits 0 while the known "grows-organically" gaps
        # remain (global skills, role-x hooks dropped for the public repo). This
        # gate catches CATASTROPHIC governance drift — a deleted CLAUDE.md /
        # .control/policy.yaml, an unwired hook, a corrupt L3 params file. The
        # Makefile note stands: bstack-check tightens to `--strict` once the CI
        # skill-install story is settled (follow-up), not a red-by-design gate now.
        env:
          BSTACK_HOME: /tmp/bstack
        run: make control-audit

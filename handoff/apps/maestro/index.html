<script>
  // SERVICE-WORKER KILL SWITCH.
  // A previously-installed offline-shell worker can wedge the preview during
  // iteration (stale shell fallback / reload loop), showing a blank page. Until
  // the app is stable we do NOT register a worker — instead we actively tear
  // down any worker + its app-shell caches so every load is a clean network
  // fetch. This only clears the SW cache buckets (bv-mc-*); localStorage and
  // your work are untouched.
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then((regs) => Promise.all(regs.map((r) => r.unregister())))
      .catch(() => {});
  }
  if (window.caches && caches.keys) {
    caches.keys()
      .then((keys) => Promise.all(keys.filter((k) => /^bv-mc-/.test(k)).map((k) => caches.delete(k))))
      .catch(() => {});
  }
</script>

<!doctype html>
<!-- @dsCard group="Brand" name="Voice" subtitle="Plain language, second person, lead with the verb — quiet, capable, calm" viewport="700x190" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--background); }
  body { padding: 20px 24px; font-family: var(--bv-font-sans); color: var(--foreground); font-size: 14px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 11px; color: var(--muted-foreground); }
  .mono { font-family: var(--bv-font-mono); font-size: 11px; color: var(--muted-foreground); }
</style>
<style>
body { display: flex; flex-direction: column; gap: 10px; max-width: 620px; }
.q { font-size: 15px; line-height: 1.5; }
.q::before { content: '“'; color: var(--bv-blue); }
.q::after { content: '”'; color: var(--bv-blue); }
</style></head><body>
<span class="q">Quick check first: are you on Google (Gmail + Google Calendar) or Microsoft (Outlook + Outlook Calendar)?</span>
<span class="q">Connect both apps, then come back and I'll build your plan.</span>
<span class="q">Couldn't reach Gmail. Reconnect to keep going.</span>
<span class="label">No filler. No celebration. No em dashes. The agent has done a thousand of these.</span>
</body></html>

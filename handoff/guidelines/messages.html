<!doctype html>
<!-- @dsCard group="Components" name="Messages" subtitle="User bubble cool-gray · assistant plain text · links are ink pills · typing dots" viewport="700x250" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--background); }
  body { padding: 20px 24px; font-family: var(--bv-font-sans); color: var(--foreground); font-size: 14px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 11px; color: var(--muted-foreground); }
  .mono { font-family: var(--bv-font-mono); font-size: 11px; color: var(--muted-foreground); }
  .pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 9999px; font: inherit; font-size: 14px; font-weight: 500; height: 36px; padding: 0 14px; border: 1px solid transparent; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .pill--primary { background: var(--primary); color: var(--primary-foreground); }
  .pill--primary:hover { background: var(--bv-ink-hover); }
  .pill--secondary { background: var(--card); color: var(--foreground); border-color: var(--bv-border-15); }
  .pill--secondary:hover { background: var(--bv-frost-4); }
  .pill--soft { background: var(--bv-canvas-soft); color: var(--foreground); }
  .pill--soft:hover { background: var(--bv-frost-8); }
  .pill--ghost { background: transparent; color: var(--foreground); }
  .pill--ghost:hover { background: var(--bv-frost-8); }
  svg.ic { width: 16px; height: 16px; }
</style>
<style>
body { display: flex; flex-direction: column; gap: 14px; max-width: 560px; }
.user { align-self: flex-end; background: var(--bv-canvas-soft-2); border-radius: 24px 24px 6px 24px; padding: 10px 18px; font-size: 15px; max-width: 75%; }
.asst { font-size: 15px; line-height: 1.5; }
.asst a { display: inline-flex; align-items: center; height: 24px; padding: 0 11px; border-radius: 9999px; background: var(--primary); color: var(--primary-foreground); font-size: 12px; font-weight: 500; text-decoration: none; vertical-align: middle; }
.typing { display: inline-flex; gap: 5px; padding: 10px 14px; background: var(--bv-canvas-soft-2); border-radius: 18px; align-self: flex-start; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-foreground); animation: b 1.2s ease-in-out infinite both; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes b { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-5px); opacity: 1; } }
</style></head><body>
<div class="user">Plan my Friday</div>
<div class="asst">Here's your Fri May 22 plan. Reply <b>Google</b> or <b>Microsoft</b> and I'll take it from there. <a href="#">Open calendar</a></div>
<div class="typing"><span></span><span></span><span></span></div>
</body></html>

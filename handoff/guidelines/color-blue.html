<!doctype html>
<!-- @dsCard group="Colors" name="Blue accents + frost" subtitle="ai-blue (hue 260) owns focus, hover frost, glow · accent-blue (235) only when two accents must coexist" viewport="700x150" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--background); }
  body { padding: 20px 24px; font-family: var(--bv-font-sans); color: var(--foreground); font-size: 14px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 11px; color: var(--muted-foreground); }
  .mono { font-family: var(--bv-font-mono); font-size: 11px; color: var(--muted-foreground); }
</style>
<style>
body { display: flex; gap: 10px; align-items: flex-start; }
</style></head><body>
<div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-blue);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">ai-blue</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-blue-accent);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">accent</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-frost-4);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">frost-4</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-frost-8);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">frost-8</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-frost-12);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">frost-12</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--background);outline:2px solid var(--ring);outline-offset:2px;border:1px solid var(--bv-border-5);margin:2px;"></div>
  <span class="mono" style="font-size:10px;">focus ring</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-glow-blue);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">glow-1</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-glow-indigo);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">glow-2</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-glow-cyan);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">glow-3</span>
</div><div class="col" style="gap:5px;align-items:center;">
  <div style="width:52px;height:52px;border-radius:8px;background:var(--bv-glow-ice);border:1px solid var(--bv-border-5);"></div>
  <span class="mono" style="font-size:10px;">glow-4</span>
</div>
</body></html>

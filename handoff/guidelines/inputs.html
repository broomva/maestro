<!doctype html>
<!-- @dsCard group="Components" name="Inputs" subtitle="rounded-md · gray-200 edge · focus ring is ai-blue" viewport="700x160" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--background); }
  body { padding: 20px 24px; font-family: var(--bv-font-sans); color: var(--foreground); font-size: 14px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 11px; color: var(--muted-foreground); }
  .mono { font-family: var(--bv-font-mono); font-size: 11px; color: var(--muted-foreground); }
  .pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 9999px; font: inherit; font-size: 14px; font-weight: 500; height: 36px; padding: 0 14px; border: 1px solid transparent; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .pill--primary { background: var(--primary); color: var(--primary-foreground); }
  .pill--primary:hover { background: var(--bv-ink-hover); }
  .pill--secondary { background: var(--card); color: var(--foreground); border-color: var(--bv-border-15); }
  .pill--secondary:hover { background: var(--bv-frost-4); }
  .pill--soft { background: var(--bv-canvas-soft); color: var(--foreground); }
  .pill--soft:hover { background: var(--bv-frost-8); }
  .pill--ghost { background: transparent; color: var(--foreground); }
  .pill--ghost:hover { background: var(--bv-frost-8); }
  svg.ic { width: 16px; height: 16px; }
</style>
<style>
body { display: flex; gap: 16px; align-items: center; }
.input { height: 36px; padding: 0 12px; border-radius: var(--bv-radius-md); border: 1px solid var(--input); background: var(--card); font: inherit; font-size: 14px; color: var(--foreground); outline: none; width: 180px; }
.input::placeholder { color: var(--bv-gray-500); }
.input.is-focus { outline: 2px solid var(--ring); outline-offset: 2px; }
.search { display: flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px; background: var(--bv-canvas-soft); border-radius: 9999px; color: var(--muted-foreground); width: 200px; font-size: 14px; }
</style></head><body>
<div class="col" style="gap:6px;"><input class="input" placeholder="Prompt"><span class="mono">resting</span></div>
<div class="col" style="gap:6px;"><input class="input is-focus" value="Weekly planning"><span class="mono">focused · ai-blue ring</span></div>
<div class="col" style="gap:6px;"><div class="search"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Search missions</div><span class="mono">search pill</span></div>
</body></html>

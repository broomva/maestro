<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4px base · 4 8 12 16 20 24 32 40 48" viewport="700x140" -->
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--background); }
  body { padding: 20px 24px; font-family: var(--bv-font-sans); color: var(--foreground); font-size: 14px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 11px; color: var(--muted-foreground); }
  .mono { font-family: var(--bv-font-mono); font-size: 11px; color: var(--muted-foreground); }
</style>
<style>
body { display: flex; gap: 14px; align-items: flex-end; }
.s { background: var(--bv-frost-12); border-radius: 3px; width: 28px; }
</style></head><body>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:4px;"></div><span class="mono">4</span></div>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:8px;"></div><span class="mono">8</span></div>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:12px;"></div><span class="mono">12</span></div>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:16px;"></div><span class="mono">16</span></div>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:20px;"></div><span class="mono">20</span></div>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:24px;"></div><span class="mono">24</span></div>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:32px;"></div><span class="mono">32</span></div>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:40px;"></div><span class="mono">40</span></div>
<div class="col" style="gap:6px;align-items:center;"><div class="s" style="height:48px;"></div><span class="mono">48</span></div>
</body></html>
